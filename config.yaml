# ================= Altın Takip MVP — Yapılandırma =================
# Tüm eşik / URL / oran bu dosyada. Kod içine sabit gömülmez.

timezone_offset_hours: 3          # Türkiye UTC+3 (sabit, DST yok)

# Çalışma modu — sağlık metrikleri (kapsama / arşiv) buna göre kalibre edilir.
#   actions   : GitHub Actions cron'u. Zamanlanmış iş akışları kısıtlanır (bkz. alerts).
#   collector : 7/24 canlı toplayıcı (Oracle). truncgil poll_seconds geçerli olur.
runtime_mode: "actions"

paths:
  db: "data/altin.sqlite"
  db_dump: "data/altin.sql"             # diff'lenebilir dump (binary DB yerine commit'lenir)
  reports_dir: "reports"
  evds_series_file: "evds_series.json"
  holidays_file: "holidays_tr.yaml"

# ----------------- Veri kaynakları -----------------
sources:
  truncgil:
    url: "https://finans.truncgil.com/v3/today.json"
    poll_seconds: 60
    timeout: 20
    # Truncgil JSON anahtar eşlemesi (şema değişirse buradan güncelle)
    keys:
      usd: "USD"
      gram_altin: "gram-altin"          # perakende gram (saflık düzeltmesi GEREKTİRİR)
      gram_has_altin: "gram-has-altin"  # has (saf) referans — prim bunun üzerinden
      ceyrek: "ceyrek-altin"
      yarim: "yarim-altin"
      tam: "tam-altin"
      cumhuriyet: "cumhuriyet-altini"
    update_date_key: "Update_Date"

  yfinance:
    poll_seconds: 300                   # gecikmeli + rate-limit; 5 dk yeterli
    ons_ticker: "GC=F"                  # ons XAU/USD (futures proxy — canlı)
    ons_fallback_ticker: "XAUUSD=X"
    ons_hist_primary: "GC=F"            # tarihsel için GC=F (XAUUSD=X artık 404 veriyor)
    usdtry_ticker: "TRY=X"

  evds:
    # 2024 sonrası yeni servis yolu (evds2/service/evds artık SPA'ya yönleniyor).
    base: "https://evds3.tcmb.gov.tr/igmevdsms-dis"
    # API key .env içinde EVDS_API_KEY. Key header'da gönderilir (Nisan 2024 kuralı).
    start_date: "01-01-2015"
    # CANLI KEYLE TEYİT EDİLDİ (2026-07-07). Frekans yorumda.
    series:
      usdtry_buy: "TP.DK.USD.A.YTL"          # günlük
      usdtry_sell: "TP.DK.USD.S.YTL"         # günlük
      eurtry_buy: "TP.DK.EUR.A.YTL"          # günlük
      tufe: "TP.FE.OKTG01"                    # aylık (TÜFE endeksi 2003=100)
      kulce_altin_sell: "TP.MK.KUL.YTL"       # aylık — Kapalıçarşı tarihsel proxy
      cumhuriyet_sell: "TP.MK.CUM.YTL"        # aylık
      aofm_politika: "TP.APIFON4"             # günlük — AOFM (politika faizi proxy)
      mevduat_1ay: "TP.TRY.MT02"              # haftalık
      mevduat_3ay: "TP.TRY.MT03"              # haftalık
      mevduat_6ay: "TP.TRY.MT04"              # haftalık
      mevduat_1yil: "TP.TRY.MT06"             # haftalık
      enf_bek_12ay: "TP.ENFBEK.PKA12ENF"      # aylık — piyasa kat. 12 ay TÜFE beklentisi
    # 5 yıl backfill'e girecek seriler (tek seferlik, backtest hazırlığı)
    backfill:
      - usdtry_sell
      - tufe
      - kulce_altin_sell
      - cumhuriyet_sell
      - aofm_politika
      - mevduat_3ay
      - mevduat_1yil
      - enf_bek_12ay
    # Rapor bağlam satırları için stopaj (net mevduat faizi hesabı)
    mevduat_stopaj_pct: 15.0

# ----------------- Piyasa takvimi / durum makinesi -----------------
market:
  # Bacak bazında bayatlama eşiği (saniye). Aşınca STALE.
  stale_seconds:
    truncgil_gunduz: 300
    truncgil_gece: 3600
    yfinance: 1200                      # 20 dk (gecikmeli veri toleransı)
    evds: 172800                        # 2 gün (günlük yayın)
  gece_baslangic_hour: 1                # TR saatiyle 01:00-08:00 "gece" (düşük likidite)
  gece_bitis_hour: 8
  # Forex (ons + kur) seansı UTC: Pazar 22:00 -> Cuma 21:00 açık
  forex_open_sunday_utc_hour: 22
  forex_close_friday_utc_hour: 21

# ----------------- Enstrüman metrikleri (has içerik) -----------------
instruments:
  troy_ounce_gram: 31.1034768
  gram_has_purity: 1.0                  # gram-has-altin zaten saf (1000) bazında
  gram_retail_purity: 0.995             # gram-altin ~995 bazında (saflık düzeltmesi)
  coins:
    ceyrek:   { gross_g: 1.804, milyem: 0.916 }
    yarim:    { gross_g: 3.608, milyem: 0.916 }
    tam:      { gross_g: 7.216, milyem: 0.916 }
    cumhuriyet: { gross_g: 7.216, milyem: 0.916 }

# ----------------- Enstrüman maliyet/vergi modeli (Bölüm 4) -----------------
# Tüm oranlar buradan; 2026 ortası. Değişebilir — mali müşavirle doğrula.
instrument_costs:
  varsayilan_altin_getiri_yillik_pct: 30.0   # karşılaştırma senaryosu (nötr varsayım)
  banka_hesap:
    alis_makas_pct: 0.5
    satis_makas_pct: 0.5
    bsmv_pct: 0.2            # fiziki teslimatsız kaydi altında binde 2
  altin_fonu:
    yonetim_ucreti_yillik_pct: 1.0
    stopaj_pct: 15.0         # kâr üzerinden (26 Mart 2026'da %7.5'ten yükseldi)
  fiziki_gram:
    alis_satis_makas_pct: 3.0   # kuyumcu round-trip makas
  altins1:
    komisyon_pct: 0.2       # alış+satış her biri

# ----------------- Hesap / istatistik -----------------
stats:
  zscore_min_samples: 60                # arşiv < 60 gün ise "yetersiz veri"
  prim_sane_band_pct: 3.0               # |prim| bu bandın dışındaysa uyarı

# ----------------- Backtest (Bölüm 2) -----------------
backtest:
  start: "2016-01-01"
  oos_split: "2023-01-01"               # out-of-sample: öncesi fit, sonrası test
  horizons_days: { "1ay": 21, "3ay": 63, "6ay": 126 }
  weak_n_threshold: 15                  # N < bu ise "istatistiksel olarak zayıf"
  gma_window: 200                       # ons trend eşiği
  real_rate_trend_days: 63              # DFII10 trend penceresi (~3 ay)
  kur_vol_window: 60                    # gerçekleşen kur oynaklığı penceresi (gün)
  # 60g yıllıklaştırılmış kur oynaklığı eşiği: altı "baskılanıyor", üstü "serbest".
  # TL yönetilen dönemlerde <%15, serbest/şok dönemlerde >%25 tarihsel gözlem.
  kur_vol_annual_threshold_pct: 20.0
  dca_monthly_try: 1000                 # aylık DCA tutarı (nominal karşılaştırma)

# ----------------- Kadran / gösterge uzlaşı paneli (rapor E.2) -----------------
# Her gösterge altın açısından olumlu(+1)/nötr(0)/olumsuz(-1) etiketlenir.
indicators:
  fred_base: "https://fred.stlouisfed.org/graph/fredgraph.csv"
  # Actions runner'larından FRED 25 sn'de yetişmiyordu (20 Tem 2026 log'u: DFII10 + DTWEXBGS
  # "Read timed out" → panel 5 yerine 3 göstergeyle çalıştı). Timeout + yeniden deneme.
  fred_timeout_seconds: 60
  fred_retry: 2
  real_rate_series: "DFII10"            # ABD 10Y TIPS reel faiz
  dxy_series: "DTWEXBGS"                # geniş dolar endeksi (FRED)
  dxy_ticker: "DX-Y.NYB"               # yedek (yfinance)
  gld_ticker: "GLD"                     # tonaj = AUM/altın_fiyatı (eski CSV artık PDF)
  ons_ticker: "GC=F"
  trend_lookback_days: 21               # trend için ~1 ay
  thresholds:
    real_rate_bps: 5.0                  # |değişim| < 5bps -> nötr; düşüş -> olumlu
    dxy_pct: 0.5                        # |%değişim| < 0.5 -> nötr; düşüş -> olumlu
    gld_ton_pct: 0.5                    # tonaj |%| < 0.5 -> nötr; artış -> olumlu
    reel_faiz_dusuk: 2.0                # reel net mevduat < 2% -> altın olumlu
    reel_faiz_yuksek: 8.0               # > 8% -> altın olumsuz (mevduat rekabetçi)
    trends_z: 2.0                       # arama ilgisi z > 2 -> kalabalık yoğun (kontrarian olumsuz)

# ----------------- Google Trends kalabalık göstergesi (Bölüm 3) -----------------
trends:
  keywords: ["gram altın", "altın fiyatları"]
  geo: "TR"
  timeframe: "today 5-y"                # 5 yıl haftalık
  cache_hours: 24                       # günlük önbellek (rate-limit'e karşı)
  cache_file: "data/trends_cache.json"

# ----------------- Rapor / Telegram -----------------
report:
  hour_local: 20                        # gün sonu raporu saati (TR)

# ----------------- Bildirim eşikleri (rehber 6.2; zamanlayıcı Oracle'da) -----------------
alerts:
  prim_abs_pct: 1.5                     # |prim| > bu -> bildirim
  prim_z: 2.0                           # |z| > bu
  daily_move_atr: 2.0                   # günlük hareket > N × ATR
  spread_percentile: 90                 # makas > tarihsel pN -> bildirim
  quarter_z: 2.0                        # çeyrek primi |z| > bu
  cooldown_hours: 24                    # aynı sinyale soğuma
  daily_cap: 6                          # günlük toplam bildirim tavanı
  state_file: "data/alert_state.json"
  archive_freq_minutes: 15              # NOMİNAL cron (*/15) — archive.yml ile eşleşir
  # GitHub, düşük aktiviteli repolarda zamanlanmış iş akışlarını kısıtlar: cron */15 (günde 96)
  # yazsa da gerçekte teslim edilen çok daha seyrek. 12-21 Temmuz 2026 ölçümü: günde 10-17
  # çalışma (medyan ~15) => ~90-100 dk. Sağlık metrikleri NOMİNAL değil bu GÖZLEMLENEN ritme
  # göre hesaplanır; aksi halde sağlıklı sistem her gün "13 ardışık çalışma başarısız" der.
  archive_observed_freq_minutes: 90     # gözlemlenen gerçek ritim (~16 çalışma/gün)
  archive_gap_tolerance_factor: 3.0     # 90×3=270 dk; bunun altındaki boşluk normal kısıtlama
  coverage_warn_pct: 40.0               # sayım tabanlı ikincil eşik (asıl uyarı boşluk tabanlı)
telegram:
  enabled: true
  # token + chat_id .env'den (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID)
  poll_timeout: 30
  # Komut yetkilendirmesi: TELEGRAM_CHAT_ID her zaman izinli.
  # Ek izinli sohbetler (opsiyonel); izinli değilse komut sessizce yoksayılır.
  extra_allowed_chat_ids: []

# ----------------- Supervisor (7/24 watchdog) -----------------
supervisor:
  singleton_port: 47615      # tek-instance kilidi (localhost bind)

# ----------------- Yedekleme -----------------
backup:
  git_remote: "origin"
  git_branch: "main"
  commit_prefix: "backup"
